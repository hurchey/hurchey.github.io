<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eric Hurchey | Portfolio</title>
    <meta
        name="description"
        content="Terminal-first portfolio for Eric Hurchey, featuring current work at GAIN, active projects, and a dual terminal and GUI experience."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="crt-effect"></div>

    <div class="loading-screen" id="loadingScreen">
        <div class="loading-text">
            <span>Booting Eric Hurchey portfolio</span>
            <span class="loading-dots"></span>
        </div>
    </div>

    <div class="hacking-container" id="hackingContainer">
        <div class="hacking-terminal">
            <div class="hacking-header">
                <span class="hacking-title">SECURITY_CHALLENGE_v2.0 [HACK MODE] <span id="hackTypingIndicator" class="hack-typing-indicator">█</span></span>
                <div class="hack-header-actions">
                    <button class="hacking-close-btn" onclick="exitHackMode()" aria-label="Close hack terminal">X</button>
                    <button class="hacking-exit-btn" onclick="exitHackMode()">EXIT [ESC]</button>
                </div>
            </div>
            <div class="hacking-output" id="hackingOutput"></div>
            <div class="hacking-input-section">
                <span class="hacking-prompt" id="hackingPrompt">hacker@breach:~$</span>
                <input type="text" class="hacking-input" id="hackingInput" autofocus>
            </div>
        </div>
    </div>

    <div class="quick-commands-bar" id="quickCommandsBar">
        <button class="quick-cmd-close" onclick="hideQuickCommands()" aria-label="Close quick commands">X</button>
        <div class="quick-commands-container" id="quickCommandsContainer"></div>
        <div class="quick-cmd-hint">Press Tab again to close the command deck.</div>
    </div>

    <div class="terminal-container" id="terminalContainer">
        <div class="terminal-header-section">
            <div class="terminal-header">
                <div class="terminal-title">
                    <span id="terminalSystemTitle">TERMINAL://ERIC_HURCHEY.SYSTEM</span>
                </div>
                <div class="terminal-status">
                    <button class="gui-switch-btn" onclick="setMode('gui')" title="Switch to visual mode">Visual Mode</button>
                    <button class="gui-switch-btn" onclick="setMode('quant')" title="Switch to quant mode">Quant Mode</button>
                    <span class="help-text" id="terminalHelpHint">Press Tab for quick commands or type ? for help</span>
                    <div class="status-item">
                        <div class="status-dot"></div>
                        <span>CONNECTED</span>
                    </div>
                    <div class="status-item">
                        <span id="time">00:00:00</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="terminal-body">
            <div class="terminal-output" id="terminalOutput"></div>
        </div>

        <div class="terminal-input-wrapper">
            <div class="terminal-input-section">
                <span class="terminal-prompt" id="prompt">visitor@home:~$</span>
                <div class="terminal-input-container">
                    <input type="text" class="terminal-input" id="terminalInput" autofocus>
                    <span class="terminal-cursor" id="cursor"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="gui-container" id="guiContainer">
        <div class="gui-scan-line"></div>
        <canvas id="canvas3d"></canvas>

        <nav class="gui-nav">
            <div class="gui-nav-content">
                <button class="gui-nav-logo" onclick="showGuiSection('home')">Eric Hurchey</button>
                <ul class="gui-nav-menu" id="guiNavMenu"></ul>
                <div class="gui-nav-actions">
                    <button class="gui-mode-toggle" id="quantModeBtn" onclick="setMode('quant')">Quant Mode</button>
                    <button class="gui-back-btn" onclick="setMode('terminal')">Terminal</button>
                </div>
            </div>
        </nav>

        <div class="gui-content">
            <section class="gui-section active" id="gui-home"></section>
            <section class="gui-section" id="gui-now"></section>
            <section class="gui-section" id="gui-about"></section>
            <section class="gui-section" id="gui-skills"></section>
            <section class="gui-section" id="gui-projects"></section>
            <section class="gui-section" id="gui-experience"></section>
            <section class="gui-section" id="gui-contact"></section>
        </div>
    </div>

    <div class="quant-container" id="quantContainer">
        <nav class="quant-inline-nav">
            <div class="quant-inline-nav-content">
                <span class="quant-inline-brand">ERIC HURCHEY // QUANT LAB</span>
                <nav class="quant-inline-links" id="quantInlineLinks"></nav>
                <div class="quant-inline-actions">
                    <span class="quant-inline-clock" id="quantInlineClock">00:00:00</span>
                    <button class="gui-mode-toggle" onclick="setMode('gui')">Portfolio Mode</button>
                    <button class="gui-back-btn" onclick="setMode('terminal')">Terminal</button>
                </div>
            </div>
        </nav>
        <main class="quant-inline-main" id="quantInlineApp"></main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="content.js"></script>
    <script src="main.js"></script>
</body>
</html>
